<!DOCTYPE html>
<html>
<head>
  <title>AI Resume Builder</title>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1>Get Interview-Ready Resume in 60 Seconds 🚀</h1>
    <p class="subtitle">
      AI rewrites + ATS optimization + premium PDF
    </p>

    <div class="trust-bar">
      ⭐ 500+ resumes today | 🔒 Secure | ⚡ Instant PDF
    </div>
  </div>

  <!-- INPUT -->
  <div class="card">

    <label>Resume</label>
    <textarea id="resume" placeholder="Paste your resume..."></textarea>

    <label>Job Description</label>
    <textarea id="job" placeholder="Paste job description..."></textarea>

    <label>Template</label>
    <select id="template">
      <option value="modern">Modern</option>
      <option value="minimal">Minimal</option>
      <option value="creative">Creative</option>
    </select>

    <button onclick="optimizeResume()" class="main-btn">
      🚀 Generate Resume
    </button>

  </div>

  <!-- LIVE PREVIEW -->
  <div class="card">

    <h2>Live Preview</h2>

    <div id="previewBox">
      <p class="placeholder">Your AI resume will appear here...</p>
    </div>

  </div>

  <!-- ATS SCORE -->
  <div id="atsBox" class="card" style="display:none;">
    <h3>ATS Score: <span id="score">0</span>/100</h3>
    <ul id="keywords"></ul>
  </div>

  <!-- PAYMENT -->
  <div id="paymentSection" class="card" style="display:none;">

    <h2>Unlock Full Resume</h2>

    <p class="price">₹49</p>

    <p>Download premium ATS-optimized PDF</p>

    <button onclick="payNow()" class="pay-btn">
      Pay & Download
    </button>

  </div>

</div>

<script src="scripts.js"></script>

</body>
</html>
