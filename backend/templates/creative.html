<!DOCTYPE html>
<html>
<head>
<style>
@page {
  size: A4;
  margin: 15mm;
}
body {
  font-family: 'Segoe UI';
  margin: 0;
}

.header {
  background: linear-gradient(90deg, #7c3aed, #2563eb);
  color: white;
  padding: 30px;
}

.header h1 {
  margin: 0;
}

.section {
  padding: 20px 30px;
}

.section h2 {
  color: #7c3aed;
}

.card {
  background: #f3f4f6;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>{{name}}</h1>
  <p>{{email}} | {{phone}}</p>
</div>

<div class="section">
  <h2>Skills</h2>
  <p>{{skills | join(", ")}}</p>
</div>

<div class="section">
  <h2>Experience</h2>
  {% for exp in experience %}
  <div class="card">
    <b>{{exp.role}} - {{exp.company}}</b>
    <ul>
    {% for p in exp.points %}
    <li>{{p}}</li>
    {% endfor %}
    </ul>
  </div>
  {% endfor %}
</div>

</body>
</html>
