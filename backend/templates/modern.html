<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: Arial; margin: 0; }
.container { display: flex; }
.left {
  width: 30%;
  background: #2c3e50;
  color: white;
  padding: 20px;
}
.right { width: 70%; padding: 30px; }
h1 { margin: 0; font-size: 26px; }
.section { margin-top: 20px; }
.section h2 {
  border-bottom: 2px solid #3498db;
  padding-bottom: 5px;
}
p { line-height: 1.6; }
</style>
</head>

<body>
<div class="container">
  <div class="left">
    <h1>{{name}}</h1>
    <p>{{email}}</p>
    <p>{{phone}}</p>

    <div class="section">
      <h2>Skills</h2>
      <p>{{skills}}</p>
    </div>
  </div>

  <div class="right">
    <div class="section">
      <h2>Experience</h2>
      <p>{{experience}}</p>
    </div>

    <div class="section">
      <h2>Education</h2>
      <p>{{education}}</p>
    </div>
  </div>
</div>
</body>
</html>
